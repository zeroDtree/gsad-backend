spring.application.name=gsad

# Server
server.port=8080
spring.web.error.include-message=always

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/gsad
spring.datasource.username=${DB_USER:gsad}
spring.datasource.password=${DB_PASSWORD:gsad}
spring.datasource.hikari.maximum-pool-size=20

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT
jwt.secret=${JWT_SECRET:change-me-in-production-at-least-32-chars}
jwt.expiration-days=7

# Agent PSK
agent.psk=${AGENT_PSK:change-me-in-production}

# SpringDoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
