spring.application.name=gsad

# Server
server.port=8080
spring.web.error.include-message=always

# Upload limits
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/gsad
spring.datasource.username=${DB_USER:gsad}
spring.datasource.password=${DB_PASSWORD:gsad}
spring.datasource.hikari.maximum-pool-size=20

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT (dev defaults in application-dev.properties)
jwt.secret=${JWT_SECRET:}
jwt.expiration-days=1

# Agent auth (HMAC per serverId; agents receive derived PSK only)
agent.master-secret=${AGENT_MASTER_SECRET:}
agent.allow-server-registration=false

# Credential encryption at rest
credentials.encryption-key=${CREDENTIALS_ENCRYPTION_KEY}

# SpringDoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
